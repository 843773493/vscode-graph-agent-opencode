<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Remote Target</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fa;
        color: #17202a;
      }

      body {
        margin: 0;
        padding: 72px;
      }

      button,
      input {
        display: block;
        width: 280px;
        height: 48px;
        margin-bottom: 20px;
        border: 1px solid #aeb9c4;
        border-radius: 6px;
        font: inherit;
      }

      button {
        background: #16695a;
        color: #fff;
      }

      input {
        padding: 0 12px;
      }

      output {
        display: block;
        color: #4a5662;
      }
    </style>
  </head>
  <body>
    <button id="target-button" type="button">Click target</button>
    <input id="target-input" aria-label="target input" placeholder="type here">
    <output id="target-output">ready</output>
    <script>
      const button = document.querySelector("#target-button");
      const input = document.querySelector("#target-input");
      const output = document.querySelector("#target-output");

      button.addEventListener("click", () => {
        document.title = "Remote Target Clicked";
        output.value = "clicked";
      });

      input.addEventListener("input", () => {
        document.title = `Typed ${input.value}`;
        output.value = input.value;
      });
    </script>
  </body>
</html>
