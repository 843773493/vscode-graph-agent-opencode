services:
  boxteam-gateway-ssh-target:
    build:
      context: ..
      dockerfile: tools/Dockerfile.gateway-test
      args:
        BOXTEAM_GATEWAY_E2E_SSH_USER: "${BOXTEAM_GATEWAY_E2E_SSH_USER:-root}"
    image: boxteam-gateway-ssh-target:local
    ports:
      - "${BOXTEAM_GATEWAY_E2E_SSH_PORT:-22222}:22"
    volumes:
      - ..:/workspace/vscode-graph-agent-opencode
    environment:
      BOXTEAM_PROJECT_ROOT: /workspace/vscode-graph-agent-opencode
    working_dir: /workspace/vscode-graph-agent-opencode
