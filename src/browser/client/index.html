<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23111827'/%3E%3Ccircle cx='16' cy='16' r='8' fill='none' stroke='%23f8fafc' stroke-width='3'/%3E%3Cpath d='M8 16h16M16 8c2 2.5 3 5 3 8s-1 5.5-3 8M16 8c-2 2.5-3 5-3 8s1 5.5 3 8' stroke='%23f8fafc' stroke-width='2' fill='none'/%3E%3C/svg%3E" />
    <title>可附加浏览器</title>
    <link rel="stylesheet" href="./vendor/codicon/codicon.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="browser-shell">
      <header class="browser-toolbar">
        <div class="browser-title">
          <strong>可附加浏览器</strong>
          <span id="browser-id">未选择页面</span>
          <span id="attach-state-badge" class="attach-state-badge">未连接</span>
        </div>
        <div class="browser-actions">
          <button id="attach-toggle" class="icon-button" type="button" title="连接浏览器" aria-label="连接浏览器">
            <span class="codicon codicon-vm-connect icon-connect" aria-hidden="true"></span>
            <span class="codicon codicon-debug-disconnect icon-disconnect" aria-hidden="true"></span>
            <span class="sr-only">连接浏览器</span>
          </button>
          <button id="refresh-state" class="icon-button" type="button" title="刷新页面状态" aria-label="刷新页面状态">
            <span class="codicon codicon-refresh" aria-hidden="true"></span>
            <span class="sr-only">刷新页面状态</span>
          </button>
          <button id="close-browser" class="icon-button danger-soft" type="button" title="关闭浏览器页面" aria-label="关闭浏览器页面">
            <span class="codicon codicon-debug-stop" aria-hidden="true"></span>
            <span class="sr-only">关闭浏览器页面</span>
          </button>
          <button id="delete-browser" class="icon-button danger" type="button" title="删除浏览器记录" aria-label="删除浏览器记录">
            <span class="codicon codicon-trash" aria-hidden="true"></span>
            <span class="sr-only">删除浏览器记录</span>
          </button>
        </div>
      </header>

      <form id="url-form" class="url-toolbar">
        <button id="back-button" class="icon-button" type="button" title="后退" aria-label="后退">
          <span class="codicon codicon-arrow-left" aria-hidden="true"></span>
        </button>
        <button id="forward-button" class="icon-button" type="button" title="前进" aria-label="前进">
          <span class="codicon codicon-arrow-right" aria-hidden="true"></span>
        </button>
        <button id="reload-button" class="icon-button" type="button" title="刷新页面" aria-label="刷新页面">
          <span class="codicon codicon-refresh" aria-hidden="true"></span>
        </button>
        <input id="address-input" type="text" autocomplete="off" aria-label="浏览器地址" />
        <button id="go-button" class="icon-button send-button" type="submit" title="打开地址" aria-label="打开地址">
          <span class="codicon codicon-debug-start" aria-hidden="true"></span>
        </button>
      </form>

      <section id="status-line" class="status-line">等待连接</section>
      <section id="screen-stage" class="screen-stage" aria-label="浏览器远程画面">
        <div id="screen-scroll" class="screen-scroll">
          <canvas id="screen-canvas" class="screen-canvas" tabindex="0"></canvas>
        </div>
        <div id="screen-overlay" class="screen-overlay">未连接</div>
      </section>
    </main>
    <script src="./config.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
