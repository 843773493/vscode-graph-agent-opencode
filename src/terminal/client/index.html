<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23111827'/%3E%3Cpath d='M8 11l5 5-5 5M15 22h9' stroke='%23f8fafc' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
    <title>持久终端</title>
    <link rel="stylesheet" href="./vendor/codicon/codicon.css" />
    <link rel="stylesheet" href="./vendor/xterm/xterm.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="terminal-shell">
      <header class="terminal-toolbar">
        <div class="terminal-title">
          <strong>持久终端</strong>
          <span id="terminal-id">未选择终端</span>
        </div>
        <div class="terminal-actions">
          <button
            id="attach-toggle"
            class="icon-button terminal-icon-button"
            type="button"
            title="连接终端"
            aria-label="连接终端"
          >
            <span class="button-icon codicon codicon-vm-connect icon-connect" aria-hidden="true"></span>
            <span class="button-icon codicon codicon-debug-disconnect icon-disconnect" aria-hidden="true"></span>
            <span class="sr-only">连接终端</span>
          </button>
          <button
            id="refresh-snapshot"
            class="icon-button terminal-icon-button"
            type="button"
            title="刷新终端状态"
            aria-label="刷新终端状态"
          >
            <span class="button-icon codicon codicon-refresh" aria-hidden="true"></span>
            <span class="sr-only">刷新终端状态</span>
          </button>
          <button
            id="terminate-terminal"
            class="icon-button terminal-icon-button danger-soft"
            type="button"
            title="终止终端进程"
            aria-label="终止终端进程"
          >
            <span class="button-icon codicon codicon-debug-stop" aria-hidden="true"></span>
            <span class="sr-only">终止终端进程</span>
          </button>
          <button
            id="delete-terminal"
            class="icon-button terminal-icon-button danger"
            type="button"
            title="删除终端记录"
            aria-label="删除终端记录"
          >
            <span class="button-icon codicon codicon-trash" aria-hidden="true"></span>
            <span class="sr-only">删除终端记录</span>
          </button>
        </div>
      </header>
      <section id="status-line" class="status-line">等待连接</section>
      <section id="terminal" class="terminal"></section>
      <form id="agent-form" class="agent-form">
        <input id="agent-input" type="text" autocomplete="off" placeholder="从网页向终端写入命令" />
        <button
          class="icon-button terminal-icon-button send-button"
          type="submit"
          title="发送输入到终端"
          aria-label="发送输入到终端"
        >
          <span class="button-icon codicon codicon-send" aria-hidden="true"></span>
          <span class="sr-only">发送输入到终端</span>
        </button>
      </form>
    </main>
    <script src="./config.js"></script>
    <script src="./vendor/xterm/xterm.js"></script>
    <script src="./vendor/xterm/addon-fit.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
